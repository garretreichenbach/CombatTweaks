site_name: CombatTweaks
site_description: A StarMade mod for tactical fleet management and armor HP defense
site_url: https://garretreichenbach.github.io/CombatTweaks/
repo_url: https://github.com/garretreichenbach/CombatTweaks
repo_name: garretreichenbach/CombatTweaks

theme:
  name: readthedocs
  highlightjs: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
  - Features:
    - Tactical Map: features/tactical-map.md
    - Fleet AI Orders: features/fleet-orders.md
    - Incoming Signatures: features/incoming-signatures.md
    - Armor HP System: features/armor-hp.md
    - Auras: features/auras.md
    - Aura Disruptor: features/aura-disruptor.md
    - Warhead Pre-Charger: features/warhead-pre-charger.md
    - Thrust Blast: features/thrust-blast.md
    - Configuration: features/configuration.md
  - Development:
    - Building from Source: development/building.md

markdown_extensions:
  - tables
  - admonition
  - toc:
      permalink: true
